<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Student Attendance</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light">
  <div class="container py-4">
    <h1 class="h3 mb-3">Admin Dashboard</h1>

    <!-- Admin Setup Section (shown only if no admin exists) -->
    <div id="setupSection" class="card mb-4" style="display:none;">
      <div class="card-body">
        <h5 class="card-title">Initial Admin Setup</h5>
        <p class="text-secondary small">No admin detected. Create the first admin account to proceed.</p>
        <form id="setupAdminForm" class="row g-2">
          <div class="col-md-4"><input class="form-control" placeholder="Username" id="setup_username" required></div>
          <div class="col-md-4"><input class="form-control" placeholder="Email" id="setup_email" type="email" required></div>
          <div class="col-md-4"><input class="form-control" placeholder="Password" id="setup_password" type="password" required></div>
          <div class="col-12"><button class="btn btn-success" type="submit">Create Admin</button></div>
        </form>
      </div>
    </div>

    <div id="loginSection" class="card mb-4" style="display:none;">
      <div class="card-body">
        <h5 class="card-title">JWT Login</h5>
        <form id="loginForm" class="row gy-2 gx-3 align-items-center">
          <div class="col-auto">
            <input class="form-control" placeholder="username" id="username" />
          </div>
          <div class="col-auto">
            <input class="form-control" placeholder="password" id="password" type="password" />
          </div>
          <div class="col-auto">
            <button class="btn btn-primary" type="submit">Login</button>
          </div>
        </form>
        <div class="small text-secondary mt-2">Token: <code id="tokenPreview">(not logged in)</code></div>
      </div>
    </div>

    <div id="manageSections" class="row g-4" style="display:none;">
      <div class="col-lg-6">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title">Students</h5>
            <form id="addStudentForm" class="row g-2">
              <div class="col-4"><input class="form-control" placeholder="USN" id="s_usn" required></div>
              <div class="col-8"><input class="form-control" placeholder="Name" id="s_name" required></div>
              <div class="col-6"><input class="form-control" placeholder="Student Phone" id="s_sphone" required></div>
              <div class="col-6"><input class="form-control" placeholder="Parent Phone" id="s_pphone" required></div>
              <div class="col-12"><input class="form-control" placeholder="Email (optional)" id="s_email"></div>
              <div class="col-12"><button class="btn btn-success" type="submit">Add Student</button></div>
            </form>
            <hr />
            <button id="refreshStudents" class="btn btn-outline-primary btn-sm mb-2">Refresh</button>
            <ul id="studentsList" class="list-group small"></ul>
          </div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title">Sessions</h5>
            <div class="mb-2 d-flex gap-2 flex-wrap">
              <a class="btn btn-outline-secondary btn-sm" href="/admin/attendance/session/add-week-timetable/" target="_blank">Add Week Timetable (Admin)</a>
              <a class="btn btn-outline-secondary btn-sm" href="/admin/attendance/session/" target="_blank">Open Sessions in Admin</a>
            </div>
            <form id="startSessionForm" class="row g-2 align-items-center">
              <div class="col"><input class="form-control" placeholder="Session Name" id="sess_name"></div>
              <div class="col-auto"><button class="btn btn-success" type="submit">Start</button></div>
            </form>
            <div class="mt-3">
              <label class="form-label">Active Session ID</label>
              <input class="form-control" id="activeSessionId" placeholder="(set after starting)" />
              <button id="stopSession" class="btn btn-warning mt-2">Stop Session</button>
              <button id="markAbsent" class="btn btn-danger mt-2">Mark Remaining Absent & Send SMS</button>
            </div>
            <hr />
            <h6>Mark Present (manual)</h6>
            <form id="markPresentForm" class="row g-2 align-items-center">
              <div class="col"><input class="form-control" placeholder="USN" id="mp_usn"></div>
              <div class="col"><input class="form-control" placeholder="Session ID" id="mp_session"></div>
              <div class="col-auto"><button class="btn btn-primary" type="submit">Mark Present</button></div>
            </form>
            <div class="mt-3">
              <button id="loadRecords" class="btn btn-outline-primary btn-sm">Load Attendance Records (active session)</button>
              <ul id="recordsList" class="list-group small mt-2"></ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="uploadSection" class="card mt-4" style="display:none;">
      <div class="card-body">
        <h5 class="card-title">Upload Student Photo</h5>
        <form id="uploadPhotoForm" class="row g-2">
          <div class="col-3"><input class="form-control" placeholder="USN" id="up_usn" required></div>
          <div class="col-6"><input class="form-control" type="file" id="up_file" required></div>
          <div class="col-3"><button class="btn btn-secondary" type="submit">Upload</button></div>
        </form>
        <div class="small mt-2" id="uploadResult"></div>
      </div>
    </div>

    <div class="mt-3">
      <a href="/" class="btn btn-link">Back to Home</a>
    </div>
  </div>

<script>
  const api = {
    token: null,
    setToken(t){ this.token = t; document.getElementById('tokenPreview').textContent = t ? t.slice(0,24)+'...' : '(not logged in)'; },
    headers(){ return this.token ? { 'Authorization': 'Bearer ' + this.token } : {}; }
  };

  // Decide whether to show setup or login/management
  async function initPortal(){
    try{
      const res = await fetch('/api/accounts/admin/exists/');
      const data = await res.json();
      if(data.exists){
        document.getElementById('setupSection').style.display = 'none';
        document.getElementById('loginSection').style.display = '';
        document.getElementById('manageSections').style.display = 'none';
        document.getElementById('uploadSection').style.display = 'none';
      } else {
        document.getElementById('setupSection').style.display = '';
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('manageSections').style.display = 'none';
        document.getElementById('uploadSection').style.display = 'none';
      }
    }catch(e){
      console.error('Failed to check admin existence', e);
    }
  }

  // Handle initial admin setup
  document.getElementById('setupAdminForm')?.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const username = document.getElementById('setup_username').value;
    const email = document.getElementById('setup_email').value;
    const password = document.getElementById('setup_password').value;
    const res = await fetch('/api/accounts/admin/setup/', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username,email,password}) });
    if(res.ok){
      alert('Admin created. Please login below.');
      await initPortal();
    } else {
      const t = await res.text();
      alert('Failed to create admin: ' + t);
    }
  });

  document.getElementById('loginForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const res = await fetch('/api/accounts/token/', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username,password})});
    if(res.ok){
      const data = await res.json();
      api.setToken(data.access);
      document.getElementById('manageSections').style.display = '';
      document.getElementById('uploadSection').style.display = '';
      alert('Logged in');
    } else {
      alert('Login failed');
    }
  });

  async function refreshStudents(){
    const res = await fetch('/api/accounts/students/', { headers: api.headers() });
    const list = document.getElementById('studentsList');
    list.innerHTML = '';
    if(res.ok){
      const data = await res.json();
      data.forEach(s => {
        const li = document.createElement('li');
        li.className = 'list-group-item';
        li.textContent = `${s.usn} - ${s.name} (${s.student_phone}/${s.parent_phone})`;
        list.appendChild(li);
      });
    }
  }
  document.getElementById('refreshStudents').addEventListener('click', refreshStudents);

  document.getElementById('addStudentForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const body = {
      usn: document.getElementById('s_usn').value,
      name: document.getElementById('s_name').value,
      student_phone: document.getElementById('s_sphone').value,
      parent_phone: document.getElementById('s_pphone').value,
      email: document.getElementById('s_email').value
    };
    const res = await fetch('/api/accounts/students/', { method:'POST', headers:{'Content-Type':'application/json', ...api.headers()}, body: JSON.stringify(body) });
    if(res.ok){ alert('Student added'); refreshStudents(); } else { alert('Failed to add'); }
  });

  document.getElementById('startSessionForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const name = document.getElementById('sess_name').value;
    const res = await fetch('/api/attendance/sessions/start/', { method:'POST', headers:{'Content-Type':'application/json', ...api.headers()}, body: JSON.stringify({name}) });
    const data = await res.json();
    if(res.ok){ document.getElementById('activeSessionId').value = data.id; alert('Session started'); } else { alert('Failed to start'); }
  });

  document.getElementById('stopSession').addEventListener('click', async ()=>{
    const sid = document.getElementById('activeSessionId').value;
    if(!sid) return alert('Enter session id');
    const res = await fetch(`/api/attendance/sessions/${sid}/stop/`, { method:'POST', headers: api.headers() });
    if(res.ok) alert('Stopped'); else alert('Failed');
  });

  document.getElementById('markAbsent').addEventListener('click', async ()=>{
    const sid = document.getElementById('activeSessionId').value;
    if(!sid) return alert('Enter session id');
    const res = await fetch(`/api/attendance/sessions/${sid}/mark_absent/`, { method:'POST', headers: api.headers() });
    if(res.ok){ const d=await res.json(); alert('Absent marked for '+d.marked_absent); } else { alert('Failed'); }
  });

  document.getElementById('markPresentForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const usn = document.getElementById('mp_usn').value;
    const session_id = document.getElementById('mp_session').value;
    const res = await fetch('/api/attendance/records/mark_present/', { method:'POST', headers:{'Content-Type':'application/json', ...api.headers()}, body: JSON.stringify({usn, session_id}) });
    if(res.ok) alert('Marked present'); else alert('Failed');
  });

  document.getElementById('loadRecords').addEventListener('click', async ()=>{
    const sid = document.getElementById('activeSessionId').value;
    const res = await fetch(`/api/attendance/records/?session=${sid}`, { headers: api.headers() });
    const list = document.getElementById('recordsList'); list.innerHTML='';
    if(res.ok){
      const data = await res.json();
      data.forEach(r => {
        const li = document.createElement('li'); li.className='list-group-item';
        li.textContent = `${r.session_name}: ${r.student_detail.usn} ${r.student_detail.name} - ${r.status}`;
        list.appendChild(li);
      });
    }
  });

  document.getElementById('uploadPhotoForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const usn = document.getElementById('up_usn').value;
    const file = document.getElementById('up_file').files[0];
    const form = new FormData();
    form.append('usn', usn);
    form.append('photo', file);
    const res = await fetch('/api/accounts/student/upload-photo/', { method:'POST', headers: api.headers(), body: form });
    const result = document.getElementById('uploadResult');
    if(res.ok){ const d=await res.json(); result.textContent = 'Uploaded to ' + d.path; } else { result.textContent = 'Upload failed'; }
  });

  // Initialize portal UI on load
  initPortal();
</script>
</body>
</html>
