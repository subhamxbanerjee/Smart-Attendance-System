<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portal - Student Attendance</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light">
  <div class="container py-4">
    <h1 class="h3 mb-3">Student Portal</h1>

    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title">Login (JWT)</h5>
        <form id="loginForm" class="row gy-2 gx-3 align-items-center">
          <div class="col-auto">
            <input class="form-control" placeholder="username" id="username" />
          </div>
          <div class="col-auto">
            <input class="form-control" placeholder="password" id="password" type="password" />
          </div>
          <div class="col-auto">
            <button class="btn btn-primary" type="submit">Login</button>
          </div>
        </form>
        <div class="small text-secondary mt-2">Token: <code id="tokenPreview">(not logged in)</code></div>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title">Set/Reset Password</h5>
        <form id="setupForm" class="row g-2">
          <div class="col-3"><input class="form-control" placeholder="USN" id="sup_usn" required></div>
          <div class="col-3"><input class="form-control" placeholder="Username" id="sup_username" required></div>
          <div class="col-3"><input class="form-control" placeholder="Email (optional)" id="sup_email"></div>
          <div class="col-3"><input class="form-control" placeholder="Password" id="sup_password" type="password" required></div>
          <div class="col-12"><button class="btn btn-success" type="submit">Save Password</button></div>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Attendance History</h5>
        <button id="loadHistory" class="btn btn-outline-primary btn-sm">Load My Attendance</button>
        <ul id="historyList" class="list-group small mt-2"></ul>
      </div>
    </div>

    <div class="mt-3">
      <a href="/" class="btn btn-link">Back to Home</a>
    </div>
  </div>

<script>
  const api = {
    token: null,
    setToken(t){ this.token = t; document.getElementById('tokenPreview').textContent = t ? t.slice(0,24)+'...' : '(not logged in)'; },
    headers(){ return this.token ? { 'Authorization': 'Bearer ' + this.token } : {}; }
  };

  document.getElementById('loginForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const res = await fetch('/api/accounts/token/', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username,password})});
    if(res.ok){ const data = await res.json(); api.setToken(data.access); alert('Logged in'); } else { alert('Login failed'); }
  });

  document.getElementById('setupForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const body = {
      usn: document.getElementById('sup_usn').value,
      username: document.getElementById('sup_username').value,
      email: document.getElementById('sup_email').value,
      password: document.getElementById('sup_password').value
    };
    const res = await fetch('/api/accounts/student/setup-password/', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if(res.ok){ alert('Password set. You can now login.'); } else { alert('Failed to set password'); }
  });

  document.getElementById('loadHistory').addEventListener('click', async ()=>{
    const res = await fetch('/api/accounts/student/attendance-history/', { headers: api.headers() });
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    if(res.ok){
      const data = await res.json();
      data.forEach(r => {
        const li = document.createElement('li');
        li.className = 'list-group-item';
        li.textContent = `${new Date(r.timestamp).toLocaleString()} - ${r.session_name} - ${r.status.toUpperCase()}`;
        list.appendChild(li);
      });
    } else {
      alert('Please login first');
    }
  });
</script>
</body>
</html>
